services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: vehicle-service-manager
    volumes:
      - pgdata:/var/lib/postgresql/data 
    ports:
      - "5432:5432"

  frontend:
    build:
      dockerfile: Dockerfile
      context: ./frontend
    ports:
      - "80:80"

  backend:
    build:
      dockerfile: Dockerfile
      context: ./backend
    ports:
      - "3001:3001"

volumes:
  pgdata: